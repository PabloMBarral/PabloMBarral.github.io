---
layout: default
---
<div class="post-header">
  <a href="{{ '/' | relative_url }}#blog" class="back-link">← Volver al blog</a>
  <h1>{{ page.title }}</h1>
  <div class="post-meta">
    <span>{{ page.date | date: "%Y.%m.%d" }}</span>
    {% if page.tags %}<span>{{ page.tags | join: " · " }}</span>{% endif %}
  </div>
</div>
<article class="post-body">
  {{ content }}
</article>
